<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyndiCom - Confirmation réussie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CAF50;
            --navy: #0D1B2A;
            --text-main: #FFFFFF;
            --text-secondary: #94A3B8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--navy);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 400px;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            margin: 20px;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: rgba(76, 175, 80, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: var(--primary);
        }

        h1 {
            font-size: 24px;
            margin: 0 0 12px 0;
            font-weight: 700;
        }

        p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 0 0 32px 0;
        }

        .button {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h1>Email Confirmé !</h1>
        <p>Félicitations, votre compte SyndiCom a été vérifié avec succès. Vous pouvez maintenant retourner sur l'application pour vous connecter.</p>
        
        <!-- Optionnel : Un bouton qui tente d'ouvrir l'app via le schéma Expo (marche parfois) -->
        <a href="exp://" class="button">Ouvrir l'application</a>
    </div>
</body>
</html>
